<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Supply Chain</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial}

/* HEADER */
header{
background:#0B1F3A;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
}

nav a{
margin-left:20px;
cursor:pointer;
}

/* PAGE SYSTEM */
.page{display:none}
.active{display:block}

/* TRACKING PAGE */
.tracking{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;

background:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url('https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg');

background-size:cover;
}

.track-box{
display:flex;
gap:10px;
margin-top:20px;
}

.track-box input{
padding:12px;
width:250px;
}

.track-box button{
padding:12px;
background:gold;
border:none;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:40px;
}

.card{
background:#eee;
padding:20px;
cursor:pointer;
text-align:center;
}

/* SECTION */
.section{
padding:50px;
text-align:center;
}
</style>
</head>

<body>

<header>
<h3>Smart Supply Chain</h3>

<nav>
<a onclick="showPage('home')">Home</a>
<a onclick="showPage('countries')">Countries</a>
<a onclick="showPage('warehouse')">Warehouse</a>
<a onclick="showPage('shipping')">Shipping</a>
</nav>
</header>

<!-- HOME = TRACKING -->
<div id="home" class="page tracking active">

<h1>Track Your Shipment</h1>

<div class="track-box">
<input id="trackInput" placeholder="Enter Tracking Number">
<button onclick="track()">Track</button>
</div>

<div id="result"></div>

</div>

<!-- COUNTRIES PAGE -->
<div id="countries" class="page section">
<h2>Countries</h2>

<div class="grid">
<div class="card" onclick="openCountry('Egypt')">🇪🇬 Egypt</div>
<div class="card" onclick="openCountry('France')">🇫🇷 France</div>
<div class="card" onclick="openCountry('Italy')">🇮🇹 Italy</div>
<div class="card" onclick="openCountry('Canada')">🇨🇦 Canada</div>
<div class="card" onclick="openCountry('Germany')">🇩🇪 Germany</div>
<div class="card" onclick="openCountry('USA')">🇺🇸 USA</div>
</div>
</div>

<!-- WAREHOUSE PAGE -->
<div id="warehouse" class="page section">
<h2 id="countryName">Warehouse</h2>
<p>Warehouse near airport & seaport</p>
</div>

<!-- SHIPPING PAGE -->
<div id="shipping" class="page section">
<h2>Shipping Methods</h2>

<div class="grid">
<div class="card">🚢 Sea Freight</div>
<div class="card">✈️ Air Freight</div>
</div>
</div>

<script>

/* NAVIGATION */
function showPage(page){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(page).classList.add('active');
}

/* TRACKING */
function track(){
let id=document.getElementById("trackInput").value;

if(id=="1234"){
result.innerHTML="🚢 Canada → France (3 days)";
}
else if(id=="2222"){
result.innerHTML="✈️ Austria → UK (2 days)";
}
else{
result.innerHTML="Not found";
}
}

/* OPEN COUNTRY */
function openCountry(name){
showPage('warehouse');
document.getElementById("countryName").innerText = name + " Warehouse";
}

</script>

</body>
</html>

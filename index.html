<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Supply Chain</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins;background:#f4f6f9}

/* HEADER */
header{
background:#0B1F3A;
color:white;
padding:15px 50px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:3px solid #D4AF37;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

/* HERO */
.hero{
height:100vh;
position:relative;
background:
linear-gradient(rgba(11,31,58,0.85),rgba(11,31,58,0.9)),
url('https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg');
background-size:cover;
color:white;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
font-size:55px;
margin-bottom:20px;
}

.hero input{
padding:12px;
width:260px;
border:none;
border-radius:5px;
}

.hero button{
padding:12px 25px;
background:#D4AF37;
border:none;
margin-left:10px;
cursor:pointer;
}

/* MAP DOT */
.dot{
width:12px;
height:12px;
background:red;
border-radius:50%;
position:absolute;
animation:move 6s linear infinite;
}

@keyframes move{
0%{left:25%;top:60%;}
100%{left:70%;top:40%;}
}

/* SECTIONS */
.section{
padding:80px 50px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

/* FOOTER */
footer{
background:#0B1F3A;
color:white;
padding:30px;
text-align:center;
}
</style>
</head>

<body>

<header>
<div class="logo">

<!-- LOTUS LOGO -->
<svg width="40" height="40" viewBox="0 0 100 100">
<path d="M50 10 L65 40 L50 30 L35 40 Z" fill="#D4AF37"/>
<ellipse cx="50" cy="65" rx="10" ry="15" fill="#0B1F3A"/>
</svg>

<h3>Smart Supply Chain</h3>
</div>
</header>

<!-- HERO -->
<div class="hero">
<div>
<h1>Global Logistics Network</h1>

<input id="t" placeholder="Tracking Number">
<button onclick="track()">Track</button>

<div id="r"></div>
</div>

<div class="dot"></div>
</div>

<!-- SERVICES -->
<div class="section">
<h2>Our Services</h2>

<div class="grid">
<div class="card">🚢 Sea Freight</div>
<div class="card">✈️ Air Freight</div>
<div class="card">🏬 Warehousing</div>
<div class="card">📦 E-commerce</div>
</div>
</div>

<!-- COUNTRIES -->
<div class="section">
<h2>Countries</h2>

<div class="grid">
<div class="card">🇪🇬 Egypt</div>
<div class="card">🇫🇷 France</div>
<div class="card">🇮🇹 Italy</div>
<div class="card">🇨🇦 Canada</div>
</div>
</div>

<!-- CONTACT -->
<div class="section">
<h2>Contact</h2>
<p>📞 012*******</p>
<p>📧 supplychain@*****</p>
</div>

<footer>
© 2026 Smart Supply Chain
</footer>

<script>
function track(){
let id=document.getElementById("t").value;

if(id=="1234"){
r.innerHTML="🚢 Canada → France (3 days)";
}
else if(id=="2222"){
r.innerHTML="✈️ Austria → UK (2 days)";
}
else{
r.innerHTML="Not found";
}
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Supply Chain</title>

<style>
body{margin:0;font-family:Arial}

/* HEADER */
header{
background:#0B1F3A;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* LOGO */
.logo{
display:flex;
align-items:center;
gap:10px;
}

/* HERO */
.hero{
height:100vh;
position:relative;
background:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url('https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg');
background-size:cover;
color:white;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

/* MAP ANIMATION */
.dot{
width:12px;
height:12px;
background:red;
border-radius:50%;
position:absolute;
animation:move 6s infinite linear;
}

@keyframes move{
0%{left:20%;top:60%;}
100%{left:70%;top:40%;}
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
padding:20px;
}

.card{
background:#eee;
padding:20px;
cursor:pointer;
text-align:center;
}

/* SECTION */
.section{display:none}
.active{display:block}

button{padding:10px;background:gold;border:none}
</style>
</head>

<body>

<header>
<div class="logo">

<!-- LOTUS + SCARAB -->
<svg width="40" height="40">
<circle cx="20" cy="20" r="15" fill="gold"/>
</svg>

<h3>Smart Supply Chain</h3>
</div>

<nav>
<a onclick="show('home')">Home</a>
<a onclick="show('countries')">Countries</a>
<a onclick="show('shipping')">Shipping</a>
<a onclick="show('tracking')">Tracking</a>
</nav>

</header>

<!-- HOME -->
<div id="home" class="hero active">

<div>
<h1>Global Logistics Network</h1>

<input id="t" placeholder="Tracking Number">
<button onclick="track()">Track</button>

<div id="r"></div>
</div>

<div class="dot"></div>
</div>

<!-- COUNTRIES -->
<div id="countries" class="section">
<h2 style="text-align:center">Countries</h2>

<div class="grid">
<div class="card" onclick="openCountry('Egypt')">🇪🇬 Egypt</div>
<div class="card" onclick="openCountry('France')">🇫🇷 France</div>
<div class="card" onclick="openCountry('Italy')">🇮🇹 Italy</div>
<div class="card" onclick="openCountry('Canada')">🇨🇦 Canada</div>
</div>
</div>

<!-- WAREHOUSE -->
<div id="warehouse" class="section">
<h2 id="countryName" style="text-align:center"></h2>
<p style="text-align:center">Warehouse near airport & port</p>

<div class="hero">
<div class="dot"></div>
</div>
</div>

<!-- SHIPPING -->
<div id="shipping" class="section">
<h2 style="text-align:center">Shipping</h2>

<p style="text-align:center">🚢 Sea | ✈️ Air</p>

<div class="hero">
<div class="dot"></div>
</div>
</div>

<!-- TRACKING -->
<div id="tracking" class="section">
<h2 style="text-align:center">Tracking</h2>

<p style="text-align:center">1234 → Canada to France (3 days)</p>
<p style="text-align:center">2222 → Austria to UK (2 days)</p>

</div>

<script>
function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function openCountry(name){
show('warehouse');
document.getElementById("countryName").innerHTML=name;
}

function track(){
let id=document.getElementById("t").value;

if(id=="1234"){
r.innerHTML="Canada → France (3 days)";
}
else if(id=="2222"){
r.innerHTML="Austria → UK (2 days)";
}
else{
r.innerHTML="Not found";
}
}
</script>

</body>
</html>

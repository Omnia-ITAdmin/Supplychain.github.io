<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Supply Chain</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:Poppins;
  background:#F9F6F1;
  overflow-x:hidden;
}

/* HEADER */
header{
  background:#0A2540;
  color:white;
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
  position:fixed;
  width:100%;
  top:0;
  z-index:1000;
  border-bottom:3px solid #C8A96A;
}

nav a{
  color:white;
  margin:0 15px;
  text-decoration:none;
}

/* HERO */
.hero{
  height:100vh;
  position:relative;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
  overflow:hidden;
}

/* BACKGROUND */
.hero::before{
  content:"";
  position:absolute;
  width:200%;
  height:100%;
  background:url('https://images.unsplash.com/photo-1561488111-3d7b3e9dcb16');
  background-size:cover;
  animation:moveBg 60s linear infinite;
  opacity:0.35;
  z-index:-3;
}

.hero::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url('https://upload.wikimedia.org/wikipedia/commons/e/e3/Kheops-Pyramid.jpg');
  background-size:cover;
  opacity:0.15;
  z-index:-2;
}

/* ROUTE LINE */
.route{
  position:absolute;
  width:300px;
  height:2px;
  background:gold;
  top:60%;
  left:20%;
}

/* MOVING DOT */
.dot{
  position:absolute;
  width:12px;
  height:12px;
  background:#C8A96A;
  border-radius:50%;
  animation:moveDot 6s linear infinite;
}

/* MAP TRACKING DOT */
.map-dot{
  position:absolute;
  width:14px;
  height:14px;
  background:red;
  border-radius:50%;
  top:50%;
  left:40%;
  animation:zoomPulse 2s infinite;
}

/* ANIMATIONS */
@keyframes moveBg{
  from{transform:translateX(0);}
  to{transform:translateX(-30%);}
}

@keyframes moveDot{
  0%{left:20%;top:60%;}
  100%{left:60%;top:45%;}
}

/* ZOOM EFFECT */
@keyframes zoomPulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.8);}
  100%{transform:scale(1);}
}

/* BUTTON */
.btn{
  background:#C8A96A;
  color:#0A2540;
  padding:10px 20px;
  border:none;
  cursor:pointer;
  margin-top:10px;
}

/* SECTIONS */
section{
  padding:100px 40px;
  text-align:center;
}

.services{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}
.card{
  padding:20px;
  width:220px;
  background:white;
  border-radius:10px;
}

/* DASHBOARD */
.dashboard{
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}
.box{
  padding:20px;
  background:#C8A96A;
  border-radius:10px;
}

/* MAP */
.map{
  position:relative;
  height:300px;
  background:url('https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg');
  background-size:cover;
}

/* WATERMARK */
.watermark{
  position:fixed;
  bottom:10%;
  right:5%;
  width:200px;
  opacity:0.08;
  z-index:-1;
}

/* MOBILE */
@media(max-width:768px){
  header{flex-direction:column;}
  .services,.dashboard{flex-direction:column;}
}
</style>
</head>

<body>

<img class="watermark" src="https://upload.wikimedia.org/wikipedia/commons/4/4d/Tutankhamun_Mask.jpg">

<header>
  <h3>Smart Supply Chain</h3>
  <nav>
    <a href="#home">Home</a>
    <a href="#services">Services</a>
    <a href="#dashboard">Dashboard</a>
    <a href="#map">Global</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section id="home" class="hero">
  <div class="route"></div>
  <div class="dot"></div>

  <h1>Egyptian Heritage Logistics</h1>
  <p>From Egypt to Europe and the world</p>

  <input id="track" placeholder="Tracking Number">
  <button class="btn" onclick="track()">Track</button>

  <div id="result"></div>
</section>

<!-- SERVICES -->
<section id="services">
  <h2>Services</h2>
  <div class="services">
    <div class="card">🚚 Shipping</div>
    <div class="card">🏬 Warehousing</div>
    <div class="card">🛒 E-commerce</div>
  </div>
</section>

<!-- DASHBOARD -->
<section id="dashboard">
  <h2>Dashboard</h2>
  <div class="dashboard">
    <div class="box">1200 Deliveries</div>
    <div class="box">50 Warehouses</div>
    <div class="box">30 Countries</div>
  </div>
</section>

<!-- MAP -->
<section id="map">
  <h2>Global Network</h2>
  <div class="map">
    <div class="map-dot"></div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  <input placeholder="Email"><br><br>
  <textarea placeholder="Message"></textarea><br>
  <button class="btn">Send</button>
</section>

<footer style="text-align:center;padding:20px;">
© 2026 Smart Supply Chain
</footer>

<script>
const shipments={
  "9885":{
    from:"Italy",
    to:"Canada",
    timeline:["Italy","Mediterranean","Atlantic","Canada","Out for delivery"],
    days:3
  },
  "1234":{
    from:"Egypt",
    to:"France",
    timeline:["Cairo","Airport","Flight","Paris","Delivered"],
    days:5
  }
};

function track(){
  let id=document.getElementById("track").value;
  let r=document.getElementById("result");

  if(shipments[id]){
    let s=shipments[id];
    let step=Math.floor(Date.now()/5000)%s.timeline.length;

    r.innerHTML=`
    📦 ${id}<br>
    🌍 ${s.from} → ${s.to}<br>
    📍 ${s.timeline[step]}<br>
    ⏳ ${s.days} days remaining
    `;
  } else {
    r.innerHTML="❌ Tracking not found";
  }
}
</script>

</body>
</html>

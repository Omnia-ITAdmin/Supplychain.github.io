<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Supply Chain</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:Poppins;
  background:#F9F6F1;
  background-image:url('https://www.transparenttextures.com/patterns/egyptian.png');
}

/* HEADER */
header{
  background:#0A2540;
  color:white;
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
  position:fixed;
  width:100%;
  top:0;
  z-index:1000;
  border-bottom:3px solid #C8A96A;
}

nav a{
  color:white;
  margin:0 15px;
  text-decoration:none;
}

.dropdown{position:relative;}
.dropdown-content{
  display:none;
  position:absolute;
  background:white;
}
.dropdown:hover .dropdown-content{display:block;}

/* HERO */
.hero{
  height:100vh;
  background:linear-gradient(rgba(10,37,64,0.8),rgba(10,37,64,0.8)),
  url('https://images.unsplash.com/photo-1561488111-3d7b3e9dcb16');
  background-size:cover;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

input{padding:10px;width:250px;}
.btn{
  background:#C8A96A;
  padding:10px 20px;
  border:none;
  cursor:pointer;
}

/* SECTIONS */
section{padding:100px 40px;text-align:center;}

.services{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;}
.card{
  padding:20px;
  width:220px;
  background:white;
  border-radius:10px;
}

/* DASHBOARD */
.dashboard{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;}
.box{padding:20px;background:#C8A96A;border-radius:10px;}

/* MAP */
.map{
  height:300px;
  background:url('https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg');
  background-size:cover;
}

/* MOBILE */
@media(max-width:768px){
  header{flex-direction:column;}
  .services,.dashboard{flex-direction:column;}
}
</style>
</head>

<body>

<header>
  <h3>Smart Supply Chain</h3>
  <nav>
    <a href="#home">Home</a>
    <a href="#services">Services</a>
    <a href="#dashboard">Dashboard</a>
    <a href="#map">Global</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section id="home" class="hero">
  <h1>Egyptian Heritage Logistics</h1>
  <p>Global Smart Supply Chain</p>

  <input id="track" placeholder="Enter Tracking Number">
  <button class="btn" onclick="track()">Track</button>

  <div id="result"></div>
</section>

<!-- SERVICES -->
<section id="services">
  <h2>Services</h2>
  <div class="services">
    <div class="card">🚚 Shipping</div>
    <div class="card">🏬 Warehousing</div>
    <div class="card">🛒 E-commerce</div>
  </div>
</section>

<!-- DASHBOARD -->
<section id="dashboard">
  <h2>Dashboard</h2>
  <div class="dashboard">
    <div class="box">1200 Deliveries</div>
    <div class="box">50 Warehouses</div>
    <div class="box">30 Countries</div>
  </div>
</section>

<!-- MAP -->
<section id="map">
  <h2>Global Network</h2>
  <div class="map"></div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  <input placeholder="Email"><br><br>
  <textarea placeholder="Message"></textarea><br>
  <button class="btn">Send</button>
</section>

<footer style="text-align:center;padding:20px;">
© 2026 Smart Supply Chain
</footer>

<script>
/* INDUSTRY-LIKE TRACKING SIMULATION */

const shipments = {
  "9885": {
    from:"Italy",
    to:"Canada",
    timeline:[
      "📦 Package received in Italy",
      "🚢 Shipping across Mediterranean",
      "🌊 Crossing Atlantic Ocean",
      "🚚 Arrived in Canada hub",
      "📦 Out for delivery"
    ],
    days:3
  },
  "1234": {
    from:"Egypt",
    to:"France",
    timeline:[
      "📦 Package received in Cairo",
      "✈️ Departed Cairo Airport",
      "🛫 Flying over Mediterranean",
      "🇫🇷 Arrived in Paris",
      "🚚 Out for delivery"
    ],
    days:5
  }
};

function track(){
  let id=document.getElementById("track").value;
  let result=document.getElementById("result");

  if(shipments[id]){
    let s=shipments[id];

    let step=Math.min(Math.floor(Date.now()/5000)%s.timeline.length,s.timeline.length-1);

    result.innerHTML=`
    <br>
    📦 Tracking: ${id}<br>
    🌍 ${s.from} → ${s.to}<br>
    📍 Status: ${s.timeline[step]}<br>
    ⏳ ${s.days} days remaining
    `;
  } else {
    result.innerHTML="❌ Tracking not found";
  }
}
</script>

</body>
</html>

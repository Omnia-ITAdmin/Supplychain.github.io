<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Supply Chain</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Poppins;background:#f4f6f9;color:#111}

/* HEADER */
header{
  position:fixed;
  width:100%;
  background:#0B1F3A;
  color:white;
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
  border-bottom:3px solid gold;
}
nav a{
  margin-left:20px;
  cursor:pointer;
  color:white;
}

/* HERO MAP */
.hero{
  height:100vh;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
  overflow:hidden;

  background:
  linear-gradient(rgba(11,31,58,0.85),rgba(11,31,58,0.9)),
  url('https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg');

  background-size:cover;
}

/* MAP ANIMATION */
.map-animation{
  position:absolute;
  width:100%;
  height:100%;
  z-index:1;
}

/* ROUTE LINE */
.route{
  position:absolute;
  width:300px;
  height:2px;
  background:gold;
  top:60%;
  left:30%;
  transform:rotate(-20deg);
}

/* MOVING DOT */
.dot{
  width:12px;
  height:12px;
  background:#FF4D4D;
  border-radius:50%;
  position:absolute;
  top:60%;
  left:30%;
  animation:moveShip 6s linear infinite;
  box-shadow:0 0 10px #FF4D4D;
}

@keyframes moveShip{
  0%{left:30%; top:60%;}
  100%{left:60%; top:40%;}
}

/* CONTENT */
.hero-content{
  position:relative;
  z-index:2;
}

.hero h1{
  font-size:50px;
}
.hero p{
  margin:20px 0;
}

input{
  padding:12px;
  width:260px;
  border:none;
}
button{
  padding:12px 25px;
  background:gold;
  border:none;
  cursor:pointer;
}

/* SECTION */
.section{
  padding:100px 50px;
  text-align:center;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}
.card{
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* FOOTER */
footer{
  background:#0B1F3A;
  color:white;
  padding:30px;
  text-align:center;
}
</style>
</head>

<body>

<header>
<h3>Smart Supply Chain</h3>
<nav>
<a onclick="show('home')">Home</a>
<a onclick="show('services')">Services</a>
<a onclick="show('contact')">Contact</a>
</nav>
</header>

<!-- HERO -->
<section id="home" class="hero active">

<div class="map-animation">
  <div class="route"></div>
  <div class="dot"></div>
</div>

<div class="hero-content">
<h1>Global Logistics Network</h1>
<p>Tracking shipments across the world in real time</p>

<input id="track" placeholder="Tracking Number">
<button onclick="track()">Track</button>

<div id="result"></div>
</div>

</section>

<!-- SERVICES -->
<section id="services" class="section">
<h2>Our Services</h2>

<div class="grid">
<div class="card">🚢 Sea Freight</div>
<div class="card">✈️ Air Freight</div>
<div class="card">🏬 Warehousing</div>
<div class="card">📦 E-commerce</div>
</div>
</section>

<!-- CONTACT -->
<section id="contact" class="section">
<h2>Contact</h2>
<p>📞 012*******</p>
<p>📧 supplychain@*****</p>
<p>Response within 24 hours</p>
</section>

<footer>
© 2026 Smart Supply Chain
</footer>

<script>
function show(page){
document.querySelectorAll('.section').forEach(s=>s.style.display='none');
document.getElementById(page).style.display='block';
}

/* TRACKING */
function track(){
let id=document.getElementById("track").value;

if(id=="1234"){
result.innerHTML="🚢 Canada → France (3 days)";
}
else if(id=="2222"){
result.innerHTML="✈️ Austria → UK (2 days)";
}
else{
result.innerHTML="Tracking not found";
}
}
</script>

</body>
</html>

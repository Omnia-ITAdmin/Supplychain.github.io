<!-- LOGO -->
<header>
<div style="display:flex;align-items:center;gap:10px">

<svg width="40" height="40" viewBox="0 0 100 100">
<path d="M50 10 L65 40 L50 30 L35 40 Z" fill="gold"/>
<ellipse cx="50" cy="65" rx="10" ry="15" fill="#0B1F3A"/>
</svg>

<h3>Smart Supply Chain</h3>
</div>

<nav>
<a onclick="show('home')">Home</a>
<a onclick="show('countries')">Countries</a>
<a onclick="show('shipping')">Shipping</a>
<a onclick="show('tracking')">Tracking</a>
</nav>
</header>

<!-- COUNTRIES -->
<section id="countries" class="section">
<h2>Countries</h2>

<div class="grid">
<div onclick="openCountry('Egypt')">🇪🇬 Egypt</div>
<div onclick="openCountry('France')">🇫🇷 France</div>
<div onclick="openCountry('Italy')">🇮🇹 Italy</div>
<div onclick="openCountry('Canada')">🇨🇦 Canada</div>
</div>
</section>

<!-- WAREHOUSE -->
<section id="warehouse" class="section">
<h2 id="countryName"></h2>
<p>Warehouse near airport & port</p>

<div class="map">
<div class="dot"></div>
</div>
</section>

<!-- SHIPPING -->
<section id="shipping" class="section">
<h2>Shipping</h2>

<p>🚢 Sea | ✈️ Air</p>

<div class="map">
<div class="dot"></div>
</div>
</section>

<!-- TRACKING -->
<section id="tracking" class="section">
<h2>Tracking</h2>

<p>1234 → Canada to France (3 days)</p>
<p>2222 → Austria to UK (2 days)</p>

</section>

<script>
function show(id){
document.querySelectorAll('.section').forEach(s=>s.style.display='none');
document.getElementById(id).style.display='block';
}

function openCountry(name){
show('warehouse');
document.getElementById("countryName").innerHTML=name;
}
</script>
